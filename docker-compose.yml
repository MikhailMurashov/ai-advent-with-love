services:
  mcp-weather:
    build:
      context: ./services/mcp-weather
    ports:
      - "8001:8001"
    restart: unless-stopped

  mcp-time:
    build:
      context: ./services/mcp-time
    ports:
      - "8002:8002"
    restart: unless-stopped

  mcp-dadata:
    build:
      context: ./services/mcp-dadata
    ports:
      - "8003:8003"
    environment:
      - DADATA_API_KEY=${DADATA_API_KEY:-}
      - DADATA_SECRET_KEY=${DADATA_SECRET_KEY:-}
    restart: unless-stopped

  api:
    build:
      context: ./services/api
    ports:
      - "8000:8000"
    depends_on:
      - mcp-weather
      - mcp-time
      - mcp-dadata
    volumes:
      - ./data:/app/data
    environment:
      - LLM_MODEL=${LLM_MODEL:-gigachat/GigaChat-2-Pro}
      - API_KEY=${API_KEY:-}
      - GIGACHAT_CREDENTIALS=${GIGACHAT_CREDENTIALS:-}
      - GIGACHAT_SCOPE=${GIGACHAT_SCOPE:-GIGACHAT_API_PERSONAL}
      - SQLITE_PATH=/app/data/db.sqlite
      - MCP_CONFIG_PATH=/app/mcp_config.yaml
    restart: unless-stopped

#  ui:
