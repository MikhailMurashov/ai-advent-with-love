services:
  mcp-weather:
    build:
      context: ./services/mcp-weather
    ports:
      - "8001:8001"
    depends_on:
      mcp-dadata:
        condition: service_healthy
      mcp-saver:
        condition: service_healthy
      mcp-summarize:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8001/health')\""]
      interval: 1m
      timeout: 1s
      retries: 5
      start_period: 5s

  mcp-time:
    build:
      context: ./services/mcp-time
    ports:
      - "8002:8002"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8002/health')\""]
      interval: 1m
      timeout: 1s
      retries: 5
      start_period: 5s

  mcp-dadata:
    build:
      context: ./services/mcp-dadata
    ports:
      - "8003:8003"
    environment:
      - DADATA_API_KEY=${DADATA_API_KEY:-}
      - DADATA_SECRET_KEY=${DADATA_SECRET_KEY:-}
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8003/health')\""]
      interval: 1m
      timeout: 1s
      retries: 5
      start_period: 5s

  mcp-reminder:
    build:
      context: ./services/mcp-reminder
    ports:
      - "8004:8004"
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8004/health')\""]
      interval: 1m
      timeout: 1s
      retries: 5
      start_period: 5s

  mcp-saver:
    build:
      context: ./services/mcp-saver
    ports:
      - "8005:8005"
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8005/health')\""]
      interval: 1m
      timeout: 1s
      retries: 5
      start_period: 5s

  mcp-summarize:
    build:
      context: ./services/mcp-summarize
    ports:
      - "8006:8006"
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8006/health')\"" ]
      interval: 1m
      timeout: 1s
      retries: 5
      start_period: 5s

  api:
    build:
      context: ./services/api
    ports:
      - "8000:8000"
    depends_on:
      mcp-weather:
        condition: service_healthy
      mcp-time:
        condition: service_healthy
      mcp-dadata:
        condition: service_healthy
      mcp-reminder:
        condition: service_healthy
    volumes:
      - ./data:/app/data
    environment:
      - LLM_MODEL=${LLM_MODEL:-gigachat/GigaChat-2-Pro}
      - API_KEY=${API_KEY:-}
      - GIGACHAT_CREDENTIALS=${GIGACHAT_CREDENTIALS:-}
      - GIGACHAT_SCOPE=${GIGACHAT_SCOPE:-GIGACHAT_API_PERSONAL}
      - SQLITE_PATH=/app/data/db.sqlite
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 1m
      timeout: 1s
      retries: 5
      start_period: 15s

  ui-react:
    build:
      context: ./services/ui-react
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
